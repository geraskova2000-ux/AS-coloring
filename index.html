<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coloring Game</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f0ff;
}
.top{
  background:white;
  padding:16px;
  text-align:center;
  border-bottom:4px solid #222;
}
#task{font-size:34px;font-weight:bold;min-height:42px}
.controls{
  margin-top:10px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}
#scoreBox,#timerBox{
  font-size:24px;
  font-weight:bold;
  background:#fff6c7;
  border:3px solid #222;
  border-radius:16px;
  padding:8px 14px;
}
select,button{
  font-size:20px;
  font-weight:bold;
  border:3px solid #222;
  border-radius:14px;
  padding:8px 12px;
  background:white;
  cursor:pointer;
}
button{
  background:#d9ffd6;
}
button:disabled{
  opacity:.5;
  cursor:not-allowed;
}
#message{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  padding:12px;
  min-height:58px;
}
.good{color:green}
.bad{color:red}
.main{
  display:flex;
  min-height:calc(100vh - 190px);
}
.left{
  width:220px;
  background:white;
  border-right:4px solid #222;
  padding:20px;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  align-content:flex-start;
  justify-content:center;
}
.color{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid #222;
  cursor:pointer;
  transition:.2s;
}
.color:hover{transform:scale(1.08)}
.selected{outline:6px solid gold}
.right{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(4, minmax(170px, 1fr));
  gap:20px;
  align-items:center;
}
.card{
  background:white;
  border:4px solid #222;
  border-radius:25px;
  padding:15px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:240px;
}
.card:hover{transform:translateY(-5px)}
canvas{
  width:200px;
  height:200px;
  object-fit:contain;
}

.card:nth-child(5){
  grid-column:1 / 2;
}
.card:nth-child(6){
  grid-column:2 / 3;
}
.card:nth-child(7){
  grid-column:3 / 4;
}

@media(max-width:900px){
  .right{
    grid-template-columns:repeat(2, minmax(170px, 1fr));
  }
  .card:nth-child(5),
  .card:nth-child(6),
  .card:nth-child(7){
    grid-column:auto;
  }
}

@media(max-width:560px){
  .main{
    flex-direction:column;
  }
  .left{
    width:100%;
    border-right:none;
    border-bottom:4px solid #222;
  }
  .right{
    grid-template-columns:1fr;
  }
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.result{
  background:white;
  border:5px solid #222;
  border-radius:28px;
  padding:28px;
  text-align:center;
  max-width:420px;
  box-shadow:0 8px 0 rgba(0,0,0,.25);
}
.result h2{
  font-size:38px;
  margin:0 0 12px;
}
.result p{
  font-size:28px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="top">
  <div id="task">Choose time and press Start</div>
  <div class="controls">
    <label style="font-size:22px;font-weight:bold;">Time:
      <select id="timeSelect">
        <option value="30">30 sec</option>
        <option value="60" selected>1 min</option>
        <option value="90">1 min 30 sec</option>
        <option value="120">2 min</option>
        <option value="180">3 min</option>
      </select>
    </label>
    <button id="startBtn">Start</button>
    <button id="restartBtn">Restart</button>
    <div id="timerBox">⏰ <span id="timer">60</span>s</div>
    <div id="scoreBox">⭐ Score: <span id="score">0</span></div>
  </div>
</div>

<div id="message"></div>

<div class="main">
  <div class="left" id="palette"></div>
  <div class="right" id="items"></div>
</div>

<div class="overlay" id="overlay">
  <div class="result">
    <h2>Time's up!</h2>
    <p>Your score: <span id="finalScore">0</span> ⭐</p>
    <button id="playAgainBtn">Play again</button>
  </div>
</div>

<script>
const ITEMS = [
  {
    "name": "glue",
    "src": "images/glue.png"
  },
  {
    "name": "rubber",
    "src": "images/rubber.png"
  },
  {
    "name": "pencil case",
    "src": "images/pencil-case.png"
  },
  {
    "name": "book",
    "src": "images/book.png"
  },
  {
    "name": "pen",
    "src": "images/pen.png"
  },
  {
    "name": "pencil",
    "src": "images/pencil.png"
  },
  {
    "name": "bag",
    "src": "images/bag.png"
  },
  {
    "name": "present",
    "src": "images/present.png"
  }
];

const COLORS = [
  {name:"red",hex:"#e53935",rgb:[229,57,53]},
  {name:"blue",hex:"#1e88e5",rgb:[30,136,229]},
  {name:"yellow",hex:"#fdd835",rgb:[253,216,53]},
  {name:"green",hex:"#43a047",rgb:[67,160,71]},
  {name:"orange",hex:"#fb8c00",rgb:[251,140,0]},
  {name:"purple",hex:"#8e24aa",rgb:[142,36,170]},
  {name:"black",hex:"#212121",rgb:[33,33,33]},
  {name:"gray",hex:"#9e9e9e",rgb:[158,158,158]},
  {name:"brown",hex:"#795548",rgb:[121,85,72]},
  {name:"pink",hex:"#ec407a",rgb:[236,64,122]}
];

let selectedColor=null;
let currentTask=null;
let score=0;
let gameStarted=false;
let timeLeft=60;
let timerInterval=null;

const palette=document.getElementById("palette");
const itemsDiv=document.getElementById("items");
const taskDiv=document.getElementById("task");
const scoreDiv=document.getElementById("score");
const message=document.getElementById("message");
const timerDiv=document.getElementById("timer");
const timeSelect=document.getElementById("timeSelect");
const startBtn=document.getElementById("startBtn");
const restartBtn=document.getElementById("restartBtn");
const overlay=document.getElementById("overlay");
const finalScore=document.getElementById("finalScore");
const playAgainBtn=document.getElementById("playAgainBtn");

function beep(freq){
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if(!AudioContext) return;
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value=freq;
  gain.gain.value=.05;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+.08);
}

function speakText(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = 0.85;
  utterance.pitch = 1.05;
  window.speechSynthesis.speak(utterance);
}

function article(word){
  return /^[aeiou]/i.test(word) ? "an" : "a";
}

function taskSentence(itemName,colorName){
  return `It's ${article(itemName)} ${itemName}. It's ${colorName}.`;
}

function newTask(){
  const item=ITEMS[Math.floor(Math.random()*ITEMS.length)];
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  currentTask={item:item.name,color:color.name};
  const sentence = taskSentence(item.name,color.name);
  taskDiv.textContent=sentence;
  message.textContent="";
  message.className="";
  speakText(sentence);
}

function startGame(){
  score=0;
  scoreDiv.textContent=score;
  gameStarted=true;
  selectedColor=null;
  document.querySelectorAll(".color").forEach(el=>el.classList.remove("selected"));
  document.querySelectorAll("canvas").forEach(canvas=>{
    const itemName = canvas.dataset.item;
    const item = ITEMS.find(i=>i.name===itemName);
    const img = loadedImages[itemName];
    if(img) drawOriginal(canvas,img);
  });
  timeLeft=parseInt(timeSelect.value,10);
  timerDiv.textContent=timeLeft;
  overlay.style.display="none";
  clearInterval(timerInterval);
  newTask();
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerDiv.textContent=timeLeft;
    if(timeLeft<=0){
      endGame();
    }
  },1000);
}

function endGame(){
  clearInterval(timerInterval);
  gameStarted=false;
  taskDiv.textContent="Time's up!";
  message.textContent="";
  finalScore.textContent=score;
  overlay.style.display="flex";
  speakText(`Time's up! Your score is ${score}.`);
}

function drawOriginal(canvas, img){
  const ctx = canvas.getContext("2d", {willReadFrequently:true});
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
  const w = img.width * scale;
  const h = img.height * scale;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;

  ctx.drawImage(img, x, y, w, h);
}

function colorCanvas(canvas, img, rgb){
  const ctx = canvas.getContext("2d", {willReadFrequently:true});
  drawOriginal(canvas, img);

  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){
    const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];

    if(a < 20) continue;

    const brightness = (r+g+b)/3;

    // Keep black/dark outline. Color only white/light inside pixels.
    if(brightness > 120){
      data[i] = Math.round(rgb[0] * 0.82 + r * 0.18);
      data[i+1] = Math.round(rgb[1] * 0.82 + g * 0.18);
      data[i+2] = Math.round(rgb[2] * 0.82 + b * 0.18);
      data[i+3] = a;
    }
  }

  ctx.putImageData(imageData,0,0);
}

COLORS.forEach(c=>{
  const div=document.createElement("div");
  div.className="color";
  div.style.background=c.hex;
  div.title=c.name;
  div.onclick=()=>{
    if(!gameStarted){
      message.textContent="Press Start first!";
      message.className="bad";
      beep(180);
      return;
    }
    selectedColor=c;
    document.querySelectorAll(".color").forEach(el=>el.classList.remove("selected"));
    div.classList.add("selected");
    beep(700);
  };
  palette.appendChild(div);
});

const loadedImages = {};

ITEMS.forEach(item=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<canvas width="240" height="240" data-item="${item.name}"></canvas>`;

  const canvas = card.querySelector("canvas");
  const img = new Image();
  img.onload = () => {
    loadedImages[item.name] = img;
    drawOriginal(canvas,img);
  };
  img.src = item.src;

  card.onclick=()=>{
    if(!gameStarted){
      message.textContent="Press Start first!";
      message.className="bad";
      beep(180);
      return;
    }

    if(!selectedColor){
      message.textContent="Choose a color first!";
      message.className="bad";
      beep(180);
      return;
    }

    colorCanvas(canvas,img,selectedColor.rgb);
    beep(500);

    if(item.name===currentTask.item && selectedColor.name===currentTask.color){
      score++;
      scoreDiv.textContent=score;
      message.textContent="Correct! ⭐";
      message.className="good";
      beep(900);
      setTimeout(()=>{
        if(gameStarted) newTask();
      },700);
    }else{
      message.textContent="Try again!";
      message.className="bad";
      beep(150);
    }
  };

  itemsDiv.appendChild(card);
});

startBtn.onclick=startGame;
restartBtn.onclick=startGame;
playAgainBtn.onclick=startGame;

timeSelect.onchange=()=>{
  if(!gameStarted){
    timeLeft=parseInt(timeSelect.value,10);
    timerDiv.textContent=timeLeft;
  }
};

timerDiv.textContent=timeSelect.value;
</script>
</body>
</html>
